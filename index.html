<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم البوتات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #111318;
    --card: #161921;
    --border: #1e2330;
    --accent: #5865f2;
    --accent2: #57f287;
    --danger: #ed4245;
    --warn: #faa61a;
    --text: #e3e5e8;
    --muted: #72767d;
    --online: #57f287;
    --offline: #ed4245;
    --starting: #faa61a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(88,101,242,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 24px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  /* Global Actions */
  .global-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .global-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .global-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-start {
    background: rgba(87, 242, 135, 0.12);
    color: var(--accent2);
    border: 1px solid rgba(87, 242, 135, 0.25);
  }
  .btn-start:hover:not(:disabled) { background: rgba(87, 242, 135, 0.2); }

  .btn-stop {
    background: rgba(237, 66, 69, 0.12);
    color: var(--danger);
    border: 1px solid rgba(237, 66, 69, 0.25);
  }
  .btn-stop:hover:not(:disabled) { background: rgba(237, 66, 69, 0.2); }

  .btn-restart {
    background: rgba(250, 166, 26, 0.12);
    color: var(--warn);
    border: 1px solid rgba(250, 166, 26, 0.25);
  }
  .btn-restart:hover:not(:disabled) { background: rgba(250, 166, 26, 0.2); }

  .btn-refresh {
    background: rgba(88, 101, 242, 0.12);
    color: var(--accent);
    border: 1px solid rgba(88, 101, 242, 0.25);
  }
  .btn-refresh:hover:not(:disabled) { background: rgba(88, 101, 242, 0.2); }

  /* Host section */
  .host-section {
    margin-bottom: 28px;
  }

  .host-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-right: 4px;
  }

  .host-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: rgba(88,101,242,0.15);
    color: var(--accent);
    border: 1px solid rgba(88,101,242,0.3);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .host-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
  }

  /* Server Card */
  .server-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .server-card:hover { border-color: rgba(88,101,242,0.3); }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .server-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
    box-shadow: 0 0 0 0px rgba(87,242,135,0);
  }

  .status-dot.online {
    background: var(--online);
    box-shadow: 0 0 8px rgba(87,242,135,0.5);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--offline); }
  .status-dot.starting { background: var(--starting); animation: blink 0.8s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(87,242,135,0.5); }
    50% { box-shadow: 0 0 14px rgba(87,242,135,0.8); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .server-name {
    font-size: 16px;
    font-weight: 600;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(114,118,125,0.15);
    color: var(--muted);
    border: 1px solid rgba(114,118,125,0.2);
    transition: all 0.3s;
  }

  .status-badge.online {
    background: rgba(87,242,135,0.1);
    color: var(--online);
    border-color: rgba(87,242,135,0.25);
  }

  .status-badge.offline {
    background: rgba(237,66,69,0.1);
    color: var(--danger);
    border-color: rgba(237,66,69,0.25);
  }

  .status-badge.starting {
    background: rgba(250,166,26,0.1);
    color: var(--warn);
    border-color: rgba(250,166,26,0.25);
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .card-actions .btn {
    padding: 8px 16px;
    font-size: 12px;
  }

  /* Toast */
  #toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(87,242,135,0.3); color: var(--online); }
  .toast.error { border-color: rgba(237,66,69,0.3); color: var(--danger); }
  .toast.info { border-color: rgba(250,166,26,0.3); color: var(--warn); }

  /* Loading spinner in btn */
  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .global-bar { flex-direction: column; align-items: flex-start; }
    .card-top { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">Bot Control</div>
    </div>
    <h1>لوحة تحكم البوتات</h1>
    <p class="subtitle">تحكم في كل البوتات من مكان واحد</p>
  </header>

  <!-- Global Controls -->
  <div class="global-bar">
    <span class="global-label">⚡ تحكم شامل</span>
    <div class="global-btns">
      <button class="btn btn-start" onclick="allAction('start')">▶ تشغيل الكل</button>
      <button class="btn btn-restart" onclick="allAction('restart')">↺ رستارت الكل</button>
      <button class="btn btn-stop" onclick="allAction('stop')">■ إيقاف الكل</button>
      <button class="btn btn-refresh" onclick="refreshAll()">⟳ تحديث</button>
    </div>
  </div>

  <!-- bot-hosting.net -->
  <div class="host-section">
    <div class="host-header">
      <span class="host-tag">Host 1</span>
      <span class="host-name">bot-hosting.net</span>
    </div>

    <div class="server-card" id="card-0">
      <div class="card-top">
        <div class="server-info">
          <div class="status-dot" id="dot-0"></div>
          <span class="server-name">Bbbbbb</span>
          <span class="status-badge" id="badge-0">جاري التحميل...</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-start" onclick="serverAction(0,'start')">▶ تشغيل</button>
          <button class="btn btn-restart" onclick="serverAction(0,'restart')">↺ رستارت</button>
          <button class="btn btn-stop" onclick="serverAction(0,'stop')">■ إيقاف</button>
        </div>
      </div>
    </div>
  </div>

  <!-- orihost.com -->
  <div class="host-section">
    <div class="host-header">
      <span class="host-tag">Host 2</span>
      <span class="host-name">orihost.com</span>
    </div>

    <div class="server-card" id="card-1">
      <div class="card-top">
        <div class="server-info">
          <div class="status-dot" id="dot-1"></div>
          <span class="server-name">Bot 1</span>
          <span class="status-badge" id="badge-1">جاري التحميل...</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-start" onclick="serverAction(1,'start')">▶ تشغيل</button>
          <button class="btn btn-restart" onclick="serverAction(1,'restart')">↺ رستارت</button>
          <button class="btn btn-stop" onclick="serverAction(1,'stop')">■ إيقاف</button>
        </div>
      </div>
    </div>

    <div class="server-card" id="card-2">
      <div class="card-top">
        <div class="server-info">
          <div class="status-dot" id="dot-2"></div>
          <span class="server-name">Bot 2</span>
          <span class="status-badge" id="badge-2">جاري التحميل...</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-start" onclick="serverAction(2,'start')">▶ تشغيل</button>
          <button class="btn btn-restart" onclick="serverAction(2,'restart')">↺ رستارت</button>
          <button class="btn btn-stop" onclick="serverAction(2,'stop')">■ إيقاف</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script>
// ============================================================
// CONFIG - بيانات السيرفرات
// ============================================================
const SERVERS = [
  {
    id: 0,
    name: "Bbbbbb",
    panel: "https://control.bot-hosting.net",
    serverId: "769756f0-616d-4420-9ada-e83cb5b451d5",
    apiKey: "ptlc_8WoTxKr4VWm27yzC0CpZfukFFUltQdNiJ3xl07TN2B9"
  },
  {
    id: 1,
    name: "Bot 1",
    panel: "https://panel.orihost.com",
    serverId: "35c9751e-8599-4b9f-92a3-82981a197f25",
    apiKey: "ptlc_YePOKcQnXPt7cOcvHx7lINf4KmBFTrcIlYHmDTDYLi9"
  },
  {
    id: 2,
    name: "Bot 2",
    panel: "https://panel.orihost.com",
    serverId: "3831b06c-5f3c-4702-9b48-39068e41dcb2",
    apiKey: "ptlc_K8rTSvja96RYclU7v88y4zhMk7Z0GG2lNvrPs2PEzdd"
  }
];

// ============================================================
// API CALLS
// ============================================================
async function getStatus(server) {
  const url = `${server.panel}/api/client/servers/${server.serverId}/resources`;
  try {
    const res = await fetch(url, {
      headers: {
        "Authorization": `Bearer ${server.apiKey}`,
        "Accept": "application/json",
        "Content-Type": "application/json"
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.attributes?.current_state || "unknown";
  } catch (e) {
    console.error(`Status error for ${server.name}:`, e);
    return "error";
  }
}

async function sendPower(server, action) {
  const url = `${server.panel}/api/client/servers/${server.serverId}/power`;
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${server.apiKey}`,
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ signal: action })
    });
    return res.status === 204 || res.ok;
  } catch (e) {
    console.error(`Power error for ${server.name}:`, e);
    return false;
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function updateStatusUI(id, state) {
  const dot = document.getElementById(`dot-${id}`);
  const badge = document.getElementById(`badge-${id}`);

  dot.className = "status-dot";
  badge.className = "status-badge";

  const map = {
    running: { label: "يعمل ✓", cls: "online" },
    starting: { label: "يشتغل...", cls: "starting" },
    stopping: { label: "يوقف...", cls: "starting" },
    offline: { label: "متوقف", cls: "offline" },
    error: { label: "خطأ", cls: "offline" },
    unknown: { label: "غير معروف", cls: "" }
  };

  const info = map[state] || { label: state, cls: "" };
  badge.textContent = info.label;
  if (info.cls) {
    dot.classList.add(info.cls);
    badge.classList.add(info.cls);
  }
}

function showToast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

function setCardLoading(id, loading) {
  const btns = document.querySelectorAll(`#card-${id} .btn`);
  btns.forEach(b => b.disabled = loading);
}

// ============================================================
// ACTIONS
// ============================================================
const actionLabels = {
  start: { ar: "تشغيل", done: "شُغِّل ✓", type: "success" },
  stop: { ar: "إيقاف", done: "أُوقف ✓", type: "info" },
  restart: { ar: "رستارت", done: "رستارت ✓", type: "info" },
  kill: { ar: "إيقاف قسري", done: "أُوقف قسراً ✓", type: "info" }
};

async function serverAction(id, action) {
  const server = SERVERS[id];
  const label = actionLabels[action];
  setCardLoading(id, true);
  showToast(`جاري ${label.ar} ${server.name}...`, "info");

  const ok = await sendPower(server, action);

  if (ok) {
    showToast(`${server.name}: ${label.done}`, label.type);
    setTimeout(() => refreshStatus(id), 2000);
    setTimeout(() => refreshStatus(id), 5000);
  } else {
    showToast(`${server.name}: فشل الأمر ❌ (CORS؟ تحقق من الكونسول)`, "error");
    setCardLoading(id, false);
  }
}

async function allAction(action) {
  const label = actionLabels[action];
  showToast(`جاري ${label.ar} جميع البوتات...`, "info");
  await Promise.all(SERVERS.map(s => serverAction(s.id, action)));
}

async function refreshStatus(id) {
  const server = SERVERS[id];
  const state = await getStatus(server);
  updateStatusUI(id, state);
  setCardLoading(id, false);
}

async function refreshAll() {
  showToast("جاري تحديث الحالة...", "info");
  await Promise.all(SERVERS.map(s => refreshStatus(s.id)));
  showToast("تم تحديث الحالة ✓", "success");
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("load", () => {
  refreshAll();
  // تحديث تلقائي كل 30 ثانية
  setInterval(refreshAll, 30000);
});
</script>

</body>
</html>
